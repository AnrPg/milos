name: Build Docker Images

on:
  push:

jobs:
  api-verify:
    name: Verify API
    runs-on: ubuntu-latest
    env:
      CI_NETWORK: milos-ci-${{ github.run_id }}-${{ github.run_attempt }}
      CI_POSTGRES: milos-ci-postgres-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - name: Start API database
        run: |
          docker network create "$CI_NETWORK"
          docker run -d \
            --name "$CI_POSTGRES" \
            --network "$CI_NETWORK" \
            -e POSTGRES_DB=milos_training_test \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_USER=postgres \
            postgres:16-alpine
          until docker exec "$CI_POSTGRES" pg_isready -U postgres -d milos_training_test; do
            sleep 2
          done
      - name: Run API checks
        run: |
          docker run --rm \
            --network "$CI_NETWORK" \
            -v "$PWD:/workspace" \
            -w /workspace/apps/api \
            -e DB_HOST="$CI_POSTGRES" \
            -e DB_NAME=milos_training_test \
            -e DB_PASSWORD=postgres \
            -e DB_USER=postgres \
            elixir:1.18.4-otp-27 \
            sh -lc '
              . /etc/os-release
              echo "PRETTY_NAME=$PRETTY_NAME"
              elixir -v
              openssl version -a
              ldconfig -p | grep -E "libcrypto\.so\.(3|1\.1)" || true
              mix local.hex --force
              mix local.rebar --force
              mix deps.get
              mix precommit
            '
      - name: Stop API database
        if: always()
        run: |
          docker rm -f "$CI_POSTGRES" || true
          docker network rm "$CI_NETWORK" || true

  web-verify:
    name: Verify web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run type-check
        working-directory: apps/web
      - run: npm run test
        working-directory: apps/web
      - name: Export OpenAPI contract
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace/apps/api \
            elixir:1.18.4-otp-27 \
            sh -lc '
              mix local.hex --force
              mix local.rebar --force
              mix deps.get
              mix milos.export_openapi ../web/src/api/generated/openapi.json
            '
      - name: Verify generated API client
        run: |
          npx openapi-typescript src/api/generated/openapi.json -o src/api/generated/schema.ts
          git diff --exit-code -- src/api/generated/openapi.json src/api/generated/schema.ts
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - run: npx playwright install chromium
        working-directory: apps/web
      - run: npm run test:e2e
        working-directory: apps/web

  version:
    name: Pick tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: echo "tag=$(date +%s)" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.image }}
    needs: [api-verify, web-verify, version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: apps/api
          - image: web
            context: apps/web
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Create Kubeconfig
        run: |
          mkdir $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BUILDX }}" > $HOME/.kube/config
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: kubernetes
          driver-opts: namespace=tenant-4kq-gitea-runner-containers
      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: oci.4kq.net
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            oci.4kq.net/client-milos/${{ matrix.image }}:${{ github.sha }}
            oci.4kq.net/client-milos/${{ matrix.image }}:${{ needs.version.outputs.tag }}
