name: Build Docker Images

on:
  push:

jobs:
  api-verify:
    name: Verify API
    runs-on: ubuntu-latest
    container: elixir:1.18.4-otp-27
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: milos_training_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d milos_training_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify BEAM OpenSSL ABI
        run: |
          . /etc/os-release
          echo "PRETTY_NAME=$PRETTY_NAME"
          elixir -v
          openssl version -a
          ldconfig -p | grep -E 'libcrypto\.so\.(3|1\.1)' || true
      - run: mix local.hex --force
        working-directory: apps/api
      - run: mix local.rebar --force
        working-directory: apps/api
      - run: mix deps.get
        working-directory: apps/api
      - run: mix precommit
        working-directory: apps/api
        env:
          DB_HOST: postgres
          DB_NAME: milos_training_test
          DB_PASSWORD: postgres
          DB_USER: postgres

  web-verify:
    name: Verify web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run check
        working-directory: apps/web
      - run: npx playwright install chromium
        working-directory: apps/web
      - run: npm run test:e2e
        working-directory: apps/web

  version:
    name: Pick tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: echo "tag=$(date +%s)" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.image }}
    needs: [api-verify, web-verify, version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: apps/api
          - image: web
            context: apps/web
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Create Kubeconfig
        run: |
          mkdir $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BUILDX }}" > $HOME/.kube/config
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: kubernetes
          driver-opts: namespace=tenant-4kq-gitea-runner-containers
      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: oci.4kq.net
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            oci.4kq.net/client-milos/${{ matrix.image }}:${{ github.sha }}
            oci.4kq.net/client-milos/${{ matrix.image }}:${{ needs.version.outputs.tag }}
