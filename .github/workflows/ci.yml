name: CI

on:
  push:
  pull_request:

jobs:
  api-test:
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: milos_training_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d milos_training_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.4"
          otp-version: "27.0"
      - run: mix deps.get
        working-directory: apps/api
      - run: mix precommit
        working-directory: apps/api
        env:
          DB_HOST: localhost
          DB_NAME: milos_training_test
          DB_PASSWORD: postgres
          DB_USER: postgres
      - name: Verify latest migration is reversible
        run: mix ecto.rollback --step 1 && mix ecto.migrate
        working-directory: apps/api
        env:
          DB_HOST: localhost
          DB_NAME: milos_training_test
          DB_PASSWORD: postgres
          DB_USER: postgres

  web-test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.4"
          otp-version: "27.0"
      - run: npm ci
        working-directory: apps/web
      - run: node --trace-deprecation ./node_modules/.bin/eslint --version
        working-directory: apps/web
      - run: mix deps.get
        working-directory: apps/api
      - run: npm run generate:api
        working-directory: apps/web
      - run: git diff --exit-code -- src/api/generated/openapi.json src/api/generated/schema.ts
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run type-check
        working-directory: apps/web
      - run: npm run test
        working-directory: apps/web
      - run: npm audit --audit-level=high
        working-directory: apps/web
      - run: npx playwright install chromium
        working-directory: apps/web
      - run: npm run test:e2e
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web

  image-build:
    runs-on: self-hosted
    needs: [api-test, web-test]
    strategy:
      matrix:
        include:
          - context: apps/api
          - context: apps/web
    steps:
      - uses: actions/checkout@v4
      - run: docker build ${{ matrix.context }}
