services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ecto://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres/${DB_NAME:-milos_training_dev}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-milos_training_dev}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_USER: ${DB_USER:-postgres}
      GUARDIAN_ISSUER: ${GUARDIAN_ISSUER:-milos_training}
      GUARDIAN_SECRET_KEY: ${GUARDIAN_SECRET_KEY:?set GUARDIAN_SECRET_KEY in your environment or .env}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-meili-master-key}
      MEILI_URL: http://meilisearch:7700
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://media.localhost:18080}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-milos_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-milos-minio-change-me}
      MINIO_BUCKET: ${MINIO_BUCKET:-milos-invoices}
      MINIO_AVATAR_BUCKET: ${MINIO_AVATAR_BUCKET:-milos-avatars}
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SERVER: "true"
      PORT: 4000
      REDIS_URL: redis://redis:6379
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in your environment or .env}
      MIX_ENV: prod
    command: sh -lc "./bin/milos_training eval \"MilosTraining.Release.migrate()\" && exec ./bin/milos_training start"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  migrate:
    profiles: ["migration"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ecto://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres/${DB_NAME:-milos_training_dev}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-milos_training_dev}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_USER: ${DB_USER:-postgres}
      GUARDIAN_ISSUER: ${GUARDIAN_ISSUER:-milos_training}
      GUARDIAN_SECRET_KEY: ${GUARDIAN_SECRET_KEY:?set GUARDIAN_SECRET_KEY in your environment or .env}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-meili-master-key}
      MEILI_URL: http://meilisearch:7700
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: 4000
      REDIS_URL: redis://redis:6379
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in your environment or .env}
      MIX_ENV: prod
    command: ./bin/milos_training eval "MilosTraining.Release.migrate()"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks: [app]
    restart: "no"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      API_PROXY_TARGET: http://api:4000
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    ports:
      - "${CADDY_HTTP_HOST_PORT:-18080}:80"
      - "${CADDY_HTTPS_HOST_PORT:-18443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks: [app]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-milos_training_dev}
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-milos_training_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - ./.redis-data:/data
    networks: [app]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.45.2@sha256:271ee84030a77cfa8e60358138bb34260f69110795c2441437b44832fe865618
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-meili-master-key}
    volumes:
      - ./.meilisearch-data:/meili_data
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7700/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-milos_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-milos-minio-change-me}
    volumes:
      - ./.minio-data:/data
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  caddy_data:
  caddy_config:

networks:
  app:
